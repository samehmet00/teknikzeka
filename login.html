<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uygulama Paneli - TeknikZeka</title>
    <link rel="stylesheet" href="css/app.css">
</head>

<body class="light-mode">

    <nav class="navbar">
        <a href="index.html" class="logo">Teknik<span>Zeka</span></a>
        
        <div style="display: flex; gap: 15px; align-items: center; margin-left: auto;">
            <button id="theme-toggle-btn" class="nav-icon-btn" title="Temayı Değiştir" style="border-color: var(--gray-light); color: var(--text-main);">🌙</button>
            
            <div id="nav-auth-menu"></div>
        </div>
    </nav>

    <section class="app-container">
        <div class="app-wrapper">
            
            <div id="auth-container" class="auth-box">
                <h2 id="auth-title">Sisteme Giriş</h2>
                
                <form id="auth-form">
                    <input type="email" id="email" placeholder="E-posta adresiniz" required>
                    <input type="password" id="password" placeholder="Şifreniz" required>
                    <button type="submit" id="auth-btn">Giriş Yap</button>
                </form>

                <p id="toggle-text">
                    Hesabınız yok mu? <a href="#" id="toggle-link">Hemen Kayıt Olun</a>
                </p>
                <p id="auth-error" style="color: red; display: none;"></p>
            </div>

            <div id="dashboard-section" style="display: none;">
                
                <div class="ticket-box" style="padding: 2rem;">
                    <div class="premium-form-header">
                        <div class="icon-wrapper">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                            </svg>
                        </div>
                        <div>
                            <h3>Yeni Arıza Kaydı Oluştur</h3>
                            <p style="color: var(--gray-light); font-size: 0.9rem;">Cihazınızın bilgilerini ve sorunu detaylıca belirterek AI analizi başlatın.</p>
                        </div>
                    </div>

                    <form id="ticket-form">
                        <div class="premium-form-grid">
                            <div class="form-group">
                                <label>1. Cihaz Kategorisi</label>
                                <select id="device-type" class="premium-input" required></select>
                            </div>
                            
                            <div class="form-group">
                                <label>2. Cihaz Markası</label>
                                <select id="device-brand" class="premium-input" disabled required>
                                    <option value="">Önce Kategori Seçin</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>3. Cihaz Modeli</label>
                                <select id="device-model" class="premium-input" disabled required>
                                    <option value="">Önce Marka Seçin</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group" style="margin-bottom: 2rem;">
                            <label>Arıza Özeti & Gözlemleriniz</label>
                            <textarea id="issue-desc" class="premium-input" placeholder="Örn: Telefonumun ekranı aniden karardı, şarja taktığımda titriyor ama görüntü gelmiyor..." required></textarea>
                        </div>

                        <button type="submit" id="submit-ticket" class="submit-ticket-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            Yapay Zekâ ile Analiz Et ve Gönder
                        </button>
                    </form>
                    
                    <p id="ticket-msg" style="display: none; margin-top: 20px; text-align: center;"></p>
                </div>

                <div class="ticket-list-container">
                    <h3>Geçmiş Taleplerim & Ön Teşhis Raporları</h3>
                    <div id="ticket-list">
                        </div>
                </div>
            </div>
            
        </div>
    </section>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
