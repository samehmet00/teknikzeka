<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    <title>Mesajlarım - TeknikZeka</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/app.css">
    <link rel="stylesheet" href="../css/layout.css">

    
    <style>
        .chat-list-container {
            max-width: 800px;
            margin: 80px auto 30px;
            padding: 0 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .chat-list-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 16px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .chat-list-item::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--primary);
            opacity: 0;
            transition: 0.3s;
        }
        
        .chat-list-item:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        
        .chat-list-item:hover::before { opacity: 1; }

        .chat-list-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #818cf8);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            flex-shrink: 0;
            position: relative;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
        }
        
        .status-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            background: #10B981;
            border: 2px solid var(--card-bg);
            border-radius: 50%;
        }

        .chat-arrow {
            color: #94A3B8;
            transition: 0.3s;
        }
        .chat-list-item:hover .chat-arrow {
            color: var(--primary);
            transform: translateX(4px);
        }
    </style>
</head>
<body class="light-mode">

    <nav class="navbar">
        <a href="javascript:history.back()" class="logo" style="text-decoration: none; font-size: 1.2rem; display: flex; align-items: center; gap: 8px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            Geri
        </a>
        <span style="font-weight: bold; color: var(--text-main); font-size: 1.2rem;">Mesajlarım</span>
    </nav>

    <div class="chat-list-container">
        <!-- ARAMA ÇUBUĞU -->
        <div style="position: relative; margin-bottom: 20px;">
            <input type="text" id="chat-search" class="premium-input" placeholder="İsim, e-posta veya cihaz ara..." style="padding-left: 45px !important;">
            <svg style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--gray-light);" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </div>

        <!-- SEKMELER -->
        <div class="tab-container" style="border-bottom-style: dashed; margin-bottom: 25px;">
            <button class="tab-btn active" data-tab="active">
                Devam Edenler <span class="tab-badge" id="active-count" style="display:none;">0</span>
            </button>
            <button class="tab-btn" data-tab="completed">
                Tamamlananlar <span class="tab-badge" id="completed-count" style="display:none; background: #10B981;">0</span>
            </button>
        </div>

        <div id="chats-list">
            <p style="text-align: center; color: var(--gray-light); margin-top: 50px;">Sohbetleriniz kontrol ediliyor...</p>
        </div>
    </div>

    <script type="module">
        import { db, auth } from '../js/firebase-config.js';
        import { collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const chatsListEl = document.getElementById('chats-list');
        const searchInput = document.getElementById('chat-search');
        const tabBtns = document.querySelectorAll('.tab-btn');
        const activeCountEl = document.getElementById('active-count');
        const completedCountEl = document.getElementById('completed-count');

        let currentTab = 'active';
        let searchQuery = '';
        let allTickets = [];
        let currentUser = null;

        const cachedChats = localStorage.getItem('tz_chats_list_cache');
        if (cachedChats) chatsListEl.innerHTML = cachedChats;

        onAuthStateChanged(auth, (user) => {
            if (!user) return window.location.href = "login.html";
            currentUser = user;

            const q = query(collection(db, "tickets"), where("assignedService", "!=", ""));

            onSnapshot(q, (snapshot) => {
                allTickets = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.userEmail === user.email || data.assignedService === user.email) {
                        allTickets.push({ id: doc.id, ...data });
                    }
                });
                renderChats();
            });
        });

        function renderChats() {
            if (!currentUser) return;

            // Sayaçları güncelle
            const activeCount = allTickets.filter(t => !t.processCompleted).length;
            const completedCount = allTickets.filter(t => t.processCompleted).length;
            
            activeCountEl.innerText = activeCount;
            activeCountEl.style.display = activeCount > 0 ? 'inline-block' : 'none';
            completedCountEl.innerText = completedCount;
            completedCountEl.style.display = completedCount > 0 ? 'inline-block' : 'none';

            const filtered = allTickets.filter(t => {
                const partnerEmail = currentUser.email === t.userEmail ? t.assignedService : t.userEmail;
                const partnerName = partnerEmail.split('@')[0].toLowerCase();
                const device = `${t.deviceBrand} ${t.deviceModel}`.toLowerCase();
                const matchesSearch = partnerName.includes(searchQuery) || partnerEmail.toLowerCase().includes(searchQuery) || device.includes(searchQuery);
                
                const isCompleted = t.processCompleted === true;
                const matchesTab = currentTab === 'active' ? !isCompleted : isCompleted;
                
                return matchesSearch && matchesTab;
            });

            if (filtered.length > 0) {
                let html = "";
                filtered.forEach(t => {
                    const partnerEmail = currentUser.email === t.userEmail ? t.assignedService : t.userEmail;
                    const partnerName = partnerEmail.split('@')[0];
                    const avatarLetter = partnerName.charAt(0).toUpperCase();
                    
                    html += `
                        <a href="chat.html?ticketId=${t.id}" class="chat-list-item">
                            <div class="chat-list-avatar">
                                ${avatarLetter}
                                <div class="status-dot" style="background: ${t.processCompleted ? '#10B981' : '#F59E0B'}"></div>
                            </div>
                            <div style="flex: 1; overflow: hidden;">
                                <div style="display: flex; justify-content: space-between; align-items: baseline;">
                                    <h3 style="margin: 0; color: var(--text-main); font-size: 1.15rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${partnerName}</h3>
                                    <span style="font-size: 0.75rem; color: #94A3B8;">#${t.id.slice(0,6).toUpperCase()}</span>
                                </div>
                                <p style="margin: 2px 0 0 0; color: var(--primary); font-size: 0.8rem; font-weight: 600;">${partnerEmail}</p>
                                <p style="margin: 4px 0 0 0; color: var(--gray-light); font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 5px;">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
                                    ${t.deviceBrand} ${t.deviceModel} İşlemi
                                </p>
                            </div>
                            <div class="chat-arrow">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                            </div>
                        </a>
                    `;
                });
                chatsListEl.innerHTML = html;
                if (searchQuery === "") localStorage.setItem('tz_chats_list_cache', html);
            } else {
                const msg = searchQuery ? "Aramanızla eşleşen sohbet bulunamadı." : (currentTab === 'active' ? "Henüz aktif bir sohbetiniz bulunmuyor." : "Henüz tamamlanmış bir sohbetiniz bulunmuyor.");
                chatsListEl.innerHTML = `<p style="text-align: center; color: var(--gray-light); margin-top: 50px;">${msg}</p>`;
            }
        }

        // Event Listeners
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            renderChats();
        });

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTab = btn.dataset.tab;
                renderChats();
            });
        });
    </script>
</body>
</html>
