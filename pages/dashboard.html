<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">

    <!-- Mobil Uygulama (PWA) Etiketleri -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TeknikZeka">
    <link rel="manifest" href="../manifest.json">

    <title>Müşteri Paneli - TeknikZeka</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/app.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/pages.css">


    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>

<body class="light-mode">

    <nav class="navbar">
        <a href="../index.html" class="logo" style="text-decoration: none;">Teknik<span>Zeka</span></a>

        <div style="display: flex; gap: 15px; align-items: center; margin-left: auto;">
            <!-- PAKETLENMİŞ YAZI VE BUTON -->
            <div class="nav-action-pill"
                style="display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.05); padding:4px 4px 4px 12px; border-radius:10px; border:1px solid var(--border-color);">
                <span class="nav-text-label"
                    style="color:var(--text-main); font-weight:700; font-size:0.85rem; opacity:0.8; white-space:nowrap;">Geçmiş
                    Kayıtlarım</span>
                <a href="tickets.html" class="nav-icon-btn action-btn-hover" title="Geçmiş Kayıtlarım"
                    style="width:34px; height:34px; display:flex; align-items:center; justify-content:center; text-decoration:none; border-color:var(--primary); color:var(--primary); background:transparent;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="8" y1="6" x2="21" y2="6"></line>
                        <line x1="8" y1="12" x2="21" y2="12"></line>
                        <line x1="8" y1="18" x2="21" y2="18"></line>
                        <line x1="3" y1="6" x2="3.01" y2="6"></line>
                        <line x1="3" y1="12" x2="3.01" y2="12"></line>
                        <line x1="3" y1="18" x2="3.01" y2="18"></line>
                    </svg>
                </a>
            </div>

            <style>
                body.light-mode .nav-action-pill {
                    background: rgba(0, 0, 0, 0.03);
                }

                .action-btn-hover:hover {
                    background: var(--primary) !important;
                    color: white !important;
                    transform: scale(1.1);
                }

                @media (max-width: 600px) {
                    .nav-text-label {
                        display: none;
                    }

                    .nav-action-pill {
                        padding: 0;
                        background: transparent !important;
                        border: none;
                    }
                }
            </style>

            <a href="notifications.html" class="nav-icon-btn"
                style="position:relative; text-decoration:none; display:flex; align-items:center;" title="Bildirimler">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
                <span id="noti-badge"
                    style="position:absolute; top:-5px; right:-8px; background:#EF4444; color:white; border-radius:50%; width: 18px; height: 18px; font-size:0.75rem; font-weight:bold; display:none; align-items:center; justify-content:center;">0</span>
            </a>

            <!-- Profil Menüsünün Geleceği Kutu -->
            <div class="nav-actions-pill" id="nav-auth-menu">
                <!-- Javascript burayı dolduracak -->
            </div>
        </div>
    </nav>

    <section class="app-container" style="padding-top: 100px; padding-bottom: 50px;">
        <div class="app-wrapper">
            <div id="dashboard-section">

                <div class="ticket-box"
                    style="padding: 2rem; margin-bottom: 2.5rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid var(--border-color); background: var(--card-bg);">

                    <div class="premium-form-header">
                        <div class="icon-wrapper">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                            </svg>
                        </div>
                        <div>
                            <h3>Yeni Arıza Kaydı / Satış İlanı Oluştur</h3>
                            <p style="color: var(--gray-light); font-size: 0.9rem;">Cihazınızı tamir ettirebilir veya
                                arızalı haliyle teknik servislere satabilirsiniz.</p>
                        </div>
                    </div>

                    <form id="ticket-form">
                        <div class="premium-form-grid">
                            <div class="form-group"><label>1. Kategorisi</label><select id="device-type"
                                    class="premium-input" required></select></div>
                            <div class="form-group"><label>2. Markası</label><select id="device-brand"
                                    class="premium-input" disabled required>
                                    <option value="">Önce Kategori Seçin</option>
                                </select></div>
                            <div class="form-group"><label>3. Modeli</label><select id="device-model"
                                    class="premium-input" disabled required>
                                    <option value="">Önce Marka Seçin</option>
                                </select></div>
                        </div>

                        <div class="form-group" style="margin-bottom: 1.5rem;">
                            <label>Arıza Özeti</label>
                            <textarea id="issue-desc" class="premium-input" rows="3"
                                placeholder="Cihazın nesi bozuk? (Örn: Ekran kırık, açılmıyor...)" required></textarea>
                        </div>

                        <div class="sell-card-wrapper">
                            <input type="checkbox" id="is-for-sale">
                            <label for="is-for-sale" class="sell-card">
                                <div class="sell-card-icon-wrap">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <circle cx="12" cy="12" r="10"></circle>
                                        <line x1="12" y1="8" x2="12" y2="12"></line>
                                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                                    </svg>
                                </div>
                                <div class="sell-text">
                                    <h4>Arızalı Cihazı Sat</h4>
                                    <p>Tamir yerine, en yüksek fiyatı veren servise doğrudan satmak istiyorum.</p>
                                </div>
                            </label>
                        </div>

                        <div class="skip-ai-box">
                            <div style="flex:1;">
                                <span class="skip-ai-label">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                                    </svg>
                                    Hızlı Gönder
                                </span>
                                <span class="skip-ai-sub">Yapay zekâ analizini beklemeden atla.</span>
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="skip-ai">
                                <span class="slider"></span>
                            </label>
                        </div>

                        <button type="submit" id="submit-ticket" class="submit-ticket-btn">Yapay Zekâ ile Analiz Et ve
                            Gönder</button>
                    </form>

                    <p id="ticket-msg"
                        style="display: none; margin-top: 15px; text-align: center; padding: 10px; border-radius: 8px; font-size: 0.95rem; background: rgba(0,0,0,0.02);">
                    </p>
                </div>


            </div>
        </div>
    </section>


    <!-- Ana Motorlar -->
    <script type="module" src="../js/firebase-config.js"></script>
    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/theme-manager.js"></script>
</body>

</html>
