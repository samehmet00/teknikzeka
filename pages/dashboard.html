<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Müşteri Paneli - TeknikZeka</title>
    <link rel="stylesheet" href="../css/app.css"> 
    <link rel="stylesheet" href="../css/style.css"> </head>
<body class="light-mode">

    <nav class="navbar">
        <a href="../index.html" class="logo" style="text-decoration: none;">Teknik<span>Zeka</span></a>
        <div style="display: flex; gap: 15px; align-items: center; margin-left: auto;">
            
            <a href="../index.html" class="nav-icon-btn" title="Ana Sayfaya Dön"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2-2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></a>
            <div id="nav-auth-menu"></div>
            <a href="notifications.html" class="nav-icon-btn" style="position:relative; text-decoration:none;" title="Bildirimler">
                🔔
                <span id="noti-badge" style="position:absolute; top:-5px; right:-5px; background:#EF4444; color:white; border-radius:50%; width: 18px; height: 18px; font-size:0.75rem; font-weight:bold; display:none; align-items:center; justify-content:center;">0</span>
            </a>
        </div>
    </nav>

    <section class="app-container" style="padding-top: 100px;">
        <div class="app-wrapper">
            <div id="dashboard-section">
                <div class="ticket-box" style="padding: 2rem;">
                    <div class="premium-form-header">
                        <div class="icon-wrapper">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                        </div>
                        <div>
                            <h3>Yeni Arıza Kaydı / Satış İlanı Oluştur</h3>
                            <p style="color: var(--gray-light); font-size: 0.9rem;">Cihazınızı tamir ettirebilir veya arızalı haliyle teknik servislere satabilirsiniz.</p>
                        </div>
                    </div>

                    <form id="ticket-form">
                        <div class="premium-form-grid">
                            <div class="form-group"><label>1. Kategorisi</label><select id="device-type" class="premium-input" required></select></div>
                            <div class="form-group"><label>2. Markası</label><select id="device-brand" class="premium-input" disabled required><option value="">Önce Kategori Seçin</option></select></div>
                            <div class="form-group"><label>3. Modeli</label><select id="device-model" class="premium-input" disabled required><option value="">Önce Marka Seçin</option></select></div>
                        </div>

                        <div class="form-group" style="margin-bottom: 1.5rem;">
                            <label>Arıza Özeti</label>
                            <textarea id="issue-desc" class="premium-input" placeholder="Cihazın nesi bozuk? (Örn: Ekran kırık, açılmıyor...)" required></textarea>
                        </div>

                        <div class="form-group" style="margin-bottom: 2rem; display: flex; align-items: center; gap: 12px; background: rgba(16, 185, 129, 0.1); padding: 15px; border-radius: 12px; border: 1px dashed #10B981;">
                            <input type="checkbox" id="is-for-sale" style="width: 22px; height: 22px; cursor: pointer; accent-color: #10B981;">
                            <label for="is-for-sale" style="color: #10B981; font-size: 1.05rem; cursor: pointer; margin: 0; font-weight: 700;">Bu cihazı tamir ettirmek değil, arızalı haliyle servislere <span style="color: #168a05;">SATMAK</span> istiyorum.</label>
                        </div>

                        <button type="submit" id="submit-ticket" class="submit-ticket-btn">Yapay Zekâ ile Analiz Et ve Gönder</button>
                    </form>
                    <p id="ticket-msg" style="display: none; margin-top: 20px; text-align: center;"></p>
                </div>

                <div class="ticket-list-container">
                    <h3>Geçmiş Taleplerim & Ön Teşhis Raporları</h3>
                    <div id="ticket-list"></div>
                </div>
            </div>
        </div>
    </section>

    <script type="module" src="../js/firebase-config.js"></script>
    <script type="module" src="../js/app.js"></script>
    <script type="module" src="js/theme-manager.js"></script>
</body>
</html>
