<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    
    <!-- Mobil Uygulama (PWA) Etiketleri -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TeknikZeka">
    <link rel="manifest" href="../manifest.json">

    <title>Müşteri Paneli - TeknikZeka</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/app.css"> 
    
    <!-- EmailJS Kütüphanesi -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

</head>
<body class="light-mode">

    <nav class="navbar">
        <a href="../index.html" class="logo" style="text-decoration: none;">Teknik<span>Zeka</span></a>
        
        <div style="display: flex; gap: 15px; align-items: center; margin-left: auto;">
            <a href="../index.html" class="nav-icon-btn" title="Ana Sayfaya Dön"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2-2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></a>
            
            <a href="notifications.html" class="nav-icon-btn" style="position:relative; text-decoration:none; font-size: 1.4rem; padding-top: 5px;" title="Bildirimler">
                🔔
                <span id="noti-badge" style="position:absolute; top:0px; right:-5px; background:#EF4444; color:white; border-radius:50%; width: 18px; height: 18px; font-size:0.75rem; font-weight:bold; display:none; align-items:center; justify-content:center;">0</span>
            </a>
            
            <div class="nav-actions-pill" id="nav-auth-menu">
            </div>
        </div>
    </nav>

    <section class="app-container" style="padding-top: 100px; padding-bottom: 50px;">
        <div class="app-wrapper">
            <div id="dashboard-section">
                
                <div class="ticket-box" style="padding: 2rem; margin-bottom: 2.5rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid var(--border-color); background: var(--card-bg);">
                    
                    <div class="premium-form-header">
                        <div class="icon-wrapper">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                        </div>
                        <div>
                            <h3>Yeni Arıza Kaydı / Satış İlanı Oluştur</h3>
                            <p style="color: var(--gray-light); font-size: 0.9rem;">Cihazınızı tamir ettirebilir veya arızalı haliyle teknik servislere satabilirsiniz.</p>
                        </div>
                    </div>

                    <form id="ticket-form">
                        <div class="premium-form-grid">
                            <div class="form-group"><label>1. Kategorisi</label><select id="device-type" class="premium-input" required></select></div>
                            <div class="form-group"><label>2. Markası</label><select id="device-brand" class="premium-input" disabled required><option value="">Önce Kategori Seçin</option></select></div>
                            <div class="form-group"><label>3. Modeli</label><select id="device-model" class="premium-input" disabled required><option value="">Önce Marka Seçin</option></select></div>
                        </div>

                        <div class="form-group" style="margin-bottom: 1.5rem;">
                            <label>Arıza Özeti</label>
                            <textarea id="issue-desc" class="premium-input" rows="3" placeholder="Cihazın nesi bozuk? (Örn: Ekran kırık, açılmıyor...)" required></textarea>
                        </div>

                        <div class="sell-card-wrapper">
                            <input type="checkbox" id="is-for-sale">
                            <label for="is-for-sale" class="sell-card">
                                <span class="sell-icon">🤝</span>
                                <div class="sell-text">
                                    <h4>Arızalı Cihazı Sat</h4>
                                    <p>Tamir yerine, en yüksek fiyatı veren servise doğrudan satmak istiyorum.</p>
                                </div>
                            </label>
                        </div>

                        <div class="skip-ai-box">
                            <div style="flex: 1;">
                                <span style="display: block; font-weight: bold; color: var(--text-main); font-size: 0.95rem; margin-bottom: 3px;">⚡ Hızlı Gönder</span>
                                <span style="color: var(--gray-light); font-size: 0.8rem;">Yapay zekâ analizini beklemeden atla.</span>
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="skip-ai">
                                <span class="slider"></span>
                            </label>
                        </div>

                        <button type="submit" id="submit-ticket" class="submit-ticket-btn">Yapay Zekâ ile Analiz Et ve Gönder</button>
                    </form>
                    
                    <p id="ticket-msg" style="display: none; margin-top: 15px; text-align: center; padding: 10px; border-radius: 8px; font-size: 0.95rem; background: rgba(0,0,0,0.02);"></p>
                </div>

                <div class="ticket-list-container">
                    <div class="tab-container">
                        <button class="tab-btn active" onclick="switchTab('all', event)">Tüm Kayıtlarım</button>
                        <button class="tab-btn" onclick="switchTab('active', event)">Aktif İşlemlerim <span class="tab-badge" id="active-badge" style="display:none;">0</span></button>
                    </div>
                    
                    <div id="ticket-list">
                        <!-- Kayıtlar Cache'ten veya JS'den buraya gelecek -->
                    </div>
                </div>
                
            </div>
        </div>
    </section>

    <!-- HIZLI YÜKLEME VE KULLANICI ARAYÜZÜ (CACHE) -->
    <script type="module">
        import { auth, db } from '../js/firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        
        const authMenu = document.getElementById('nav-auth-menu');
        const ticketList = document.getElementById('ticket-list');

        // ÖNBELLEK: Navbar ve Kayıt Listesini Anında Bas
        const cachedUser = JSON.parse(localStorage.getItem('tz_customer_cache'));
        if (cachedUser) {
            renderAuthUI(cachedUser.username);
        }

        const cachedTicketsHtml = localStorage.getItem('tz_customer_tickets_cache');
        if (cachedTicketsHtml && ticketList) {
            ticketList.innerHTML = cachedTicketsHtml;
        } else if (ticketList) {
            ticketList.innerHTML = '<p style="color: var(--gray-light); text-align: center;">Kayıtlarınız yükleniyor...</p>';
        }

        function renderAuthUI(username) {
            if (authMenu) {
                authMenu.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div class="profile-dropdown" id="profile-dropdown-container">
                            <span class="user-name-text" style="color: var(--text-main); font-weight: bold; font-size: 1rem;">👤 ${username}</span>
                            <button class="three-dots-btn" title="Menü">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
                            </button>
                            
                            <div class="profile-dropdown-content">
                                <a href="dashboard.html">Müşteri Paneli</a>
                                <a href="profile.html">Profilim</a>
                                <a href="settings.html">Ayarlar</a>
                                <a href="chats.html">Mesajlar</a>
                            </div>
                        </div>
                        
                        <button id="home-logout-btn" class="logout-icon-btn" title="Sistemden Çıkış">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px; height:16px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                        </button>
                    </div>
                `;
                
                const dropdownContainer = document.getElementById('profile-dropdown-container');
                if (dropdownContainer) dropdownContainer.addEventListener('click', (e) => { e.stopPropagation(); dropdownContainer.classList.toggle('open'); });
                document.addEventListener('click', () => { if (dropdownContainer) dropdownContainer.classList.remove('open'); });
                
                const logoutBtn = document.getElementById('home-logout-btn');
                if (logoutBtn) logoutBtn.addEventListener('click', (e) => { 
                    e.stopPropagation(); 
                    localStorage.removeItem('tz_customer_cache');
                    localStorage.removeItem('tz_customer_tickets_cache');
                    signOut(auth).then(() => { window.location.href = "login.html"; }); 
                });
            }
        }
    </script>

    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/theme-manager.js"></script>
</body>
</html>
