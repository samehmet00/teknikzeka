<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisteme Giriş - TeknikZeka</title>
    <link rel="stylesheet" href="../css/app.css"> 
    <link rel="stylesheet" href="../css/style.css"> </head>
<body class="light-mode">

    <nav class="navbar">
        <a href="../index.html" class="logo" style="text-decoration: none;">Teknik<span>Zeka</span></a>
        <div style="display: flex; gap: 15px; align-items: center; margin-left: auto;">
            
            <button id="theme-toggle-btn" class="modern-theme-btn" title="Temayı Değiştir">
                <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
            
            <a href="../index.html" class="nav-icon-btn" title="Ana Sayfaya Dön"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2-2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></a>
        </div>
    </nav>

    <section class="app-container" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div id="auth-container" class="auth-box">
            <h2 id="auth-title">Sisteme Giriş</h2>
            <form id="auth-form">
                <input type="email" id="email" placeholder="E-posta adresiniz" required>
                <input type="password" id="password" placeholder="Şifreniz" required>
                <button type="submit" id="auth-btn">Giriş Yap</button>
            </form>
            <p id="toggle-text">Hesabınız yok mu? <a href="#" id="toggle-link">Hemen Kayıt Olun</a></p>
            <p id="auth-error" style="color: #EF4444; display: none; margin-top: 10px; font-size: 0.9rem;"></p>
        </div>
    </section>

    <script type="module" src="../js/firebase-config.js"></script>
    <script type="module" src="../js/auth.js"></script>
</body>
</html>
