<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bildirimler - TeknikZeka</title>
    <link rel="stylesheet" href="../css/app.css">
    <style>
        .noti-container { max-width: 600px; margin: 100px auto 50px; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border-color); padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .noti-item { padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; transition: 0.2s; cursor: pointer; }
        .noti-item:hover { background: rgba(79, 70, 229, 0.05); }
        .noti-item.unread { background: rgba(16, 185, 129, 0.1); border-left: 4px solid #10B981; }
        .noti-item:last-child { border-bottom: none; }
        .noti-text { color: var(--text-main); font-size: 1rem; font-weight: 600; margin-bottom: 5px; }
        .noti-time { color: var(--gray-light); font-size: 0.8rem; }
    </style>
</head>
<body class="light-mode">

    <nav class="navbar">
        <a href="javascript:history.back()" class="logo" style="text-decoration: none;">⬅️ Geri Dön</a>
        <div style="margin-left: auto;">
            <button id="theme-toggle-btn" class="theme-btn" style="border:none; font-size:1.5rem; background:transparent; cursor:pointer;">🌙</button>
        </div>
    </nav>

    <section class="noti-container">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-bottom: 15px;">
            <h2 style="margin: 0; color: var(--text-main);">🔔 Bildirimleriniz</h2>
            <button id="mark-all-read" style="background: transparent; border: 1px solid var(--border-color); padding: 5px 15px; border-radius: 8px; color: var(--text-main); cursor: pointer;">Tümünü Okundu İşaretle</button>
        </div>
        <div id="notifications-list">
            <p style="text-align: center; color: var(--gray-light); padding: 20px;">Yükleniyor...</p>
        </div>
    </section>

    <script type="module" src="../js/firebase-config.js"></script>
    <script type="module" src="../js/notifications.js"></script>
</body>
</html>
