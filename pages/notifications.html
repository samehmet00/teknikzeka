<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    
    <!-- Mobil Uygulama (PWA) Etiketleri -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TeknikZeka">
    <link rel="manifest" href="../manifest.json">

    <title>Bildirimler - TeknikZeka</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/app.css">
</head>
<body class="light-mode">

    <nav class="navbar">
        <a href="javascript:history.back()" class="logo" style="text-decoration: none;">⬅️ Geri Dön</a>
    </nav>

    <section class="noti-container">
        <div class="noti-header">
            <h2 style="margin: 0; color: var(--text-main); font-size: 1.6rem;">🔔 Bildirimleriniz</h2>
            <div class="noti-actions">
                <button id="mark-all-read" class="action-btn">✔️ Tümünü Okundu İşaretle</button>
                <button id="clear-all-btn" class="action-btn danger-btn">🗑️ Tümünü Sil</button>
            </div>
        </div>
        
        <div id="notifications-list">
            <p style="text-align: center; color: var(--gray-light); padding: 20px;">Yükleniyor...</p>
        </div>
    </section>

    <script type="module" src="../js/firebase-config.js"></script>
    <script type="module" src="../js/notifications.js"></script>
    <script type="module" src="../js/theme-manager.js"></script>
</body>
</html>
