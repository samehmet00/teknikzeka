<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TeknikZeka">
    <link rel="manifest" href="../manifest.json">
    <title>Geçmiş Arıza Kayıtlarım - TeknikZeka</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/app.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/pages.css">

</head>
<body class="light-mode">

    <nav class="navbar">
        <a href="../index.html" class="logo" style="text-decoration:none;">Teknik<span>Zeka</span></a>
        <div style="display:flex; gap:12px; align-items:center; margin-left:auto;">
            <a href="dashboard.html" class="nav-icon-btn" title="Yeni Kayıt Oluştur" style="display:flex; align-items:center; justify-content:center; text-decoration:none;">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </a>
            <a href="notifications.html" class="nav-icon-btn" style="position:relative; text-decoration:none; display:flex; align-items:center; justify-content:center;" title="Bildirimler">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                <span id="noti-badge" style="position:absolute; top:-5px; right:-5px; background:#EF4444; color:white; border-radius:50%; width:18px; height:18px; font-size:0.75rem; font-weight:bold; display:none; align-items:center; justify-content:center;">0</span>
            </a>
            <div class="nav-actions-pill" id="nav-auth-menu"></div>
        </div>
    </nav>

    <section class="app-container" style="padding-top:100px; padding-bottom:50px;">
        <div class="app-wrapper">
            <!-- Sayfa Başlığı -->
            <div class="premium-form-header" style="margin-bottom:1.5rem;">
                <div class="icon-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                </div>
                <div>
                    <h3 style="font-size:1.3rem; color:var(--text-main); margin-bottom:2px;">Geçmiş Arıza Kayıtlarım</h3>
                    <p style="color:var(--gray-light); font-size:0.88rem; margin:0;">Taleplerinizi ve servislerden gelen teklifleri buradan yönetebilirsiniz.</p>
                </div>
            </div>

            <div class="ticket-list-container">
                <div class="tab-container">
                    <button class="tab-btn active" onclick="switchTab('pending', event)">
                        Bekleyen <span class="tab-badge" id="pending-badge" style="display:none; background:var(--primary);">0</span>
                    </button>
                    <button class="tab-btn" onclick="switchTab('active', event)">
                        Aktif İşlerimde <span class="tab-badge" id="active-badge" style="display:none;">0</span>
                    </button>
                    <button class="tab-btn" onclick="switchTab('completed', event)">
                        Tamamlananlar <span class="tab-badge" id="completed-badge" style="display:none; background:#10B981;">0</span>
                    </button>
                </div>
                <div id="ticket-list">
                    <div style="text-align:center; padding:3rem 1rem; color:var(--gray-light);">
                        <div style="width:44px; height:44px; border-radius:50%; background:var(--border-color); margin:0 auto 1rem; animation:shimmer 1.5s infinite;"></div>
                        Kayıtlar yükleniyor...
                    </div>
                </div>
            </div>
        </div>

        <!-- RATING MODAL -->
        <div id="rating-modal" class="modal-overlay">
            <div class="modal-card">
                <h3 class="modal-title">Servisi Değerlendir</h3>
                <p id="rating-service-name" class="modal-subtitle">Bu servis deneyiminizi nasıl puanlarsınız?</p>
                <div id="star-rating" class="star-row">
                    <span data-val="1">★</span>
                    <span data-val="2">★</span>
                    <span data-val="3">★</span>
                    <span data-val="4">★</span>
                    <span data-val="5">★</span>
                </div>
                <textarea id="rating-comment" class="premium-input" placeholder="Deneyiminizi anlatın... (İsteğe bağlı)" style="width:100%; height:80px; resize:none;"></textarea>
                <div class="modal-actions">
                    <button onclick="document.getElementById('rating-modal').classList.remove('open')" class="modal-btn-cancel">İptal</button>
                    <button id="submit-rating-btn" class="modal-btn-submit">Gönder</button>
                </div>
            </div>
        </div>
    </section>

    <script type="module" src="../js/firebase-config.js"></script>
    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/tickets.js"></script>
    <script type="module" src="../js/theme-manager.js"></script>
</body>
</html>
